<app-navbar />

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow bg-secondary bg-opacity-50">
        <div class="card-header bg-dark text-white">
          <h4 class="mb-0">Izveidot jaunu pasākumu</h4>
        </div>
        <div class="card-body fw-bold">

          @if (errorMessage()) {
            <div class="alert alert-danger">{{ errorMessage() }}</div>
          }

          <!-- NOSAUKUMS -->
          <div class="mb-3">
            <label class="form-label">Nosaukums *</label>
            <input type="text" class="form-control bg-secondary bg-opacity-50 fw-bold"
                   [formField]="eventForm.event.title"
                   placeholder="Pasākuma nosaukums">
            <app-error-validation [fieldState]="eventForm.event.title()" />
          </div>

          <!-- APRAKSTS -->
          <div class="mb-3">
            <label class="form-label">Apraksts</label>
            <textarea class="form-control bg-secondary bg-opacity-50 fw-bold"
                      [formField]="eventForm.event.description"
                      rows="3"
                      placeholder="Apraksts par pasākumu..."></textarea>
          </div>

          <!-- DATUMS + LAIKS -->
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label">Datums *</label>
              <input type="date" class="form-control bg-secondary bg-opacity-50 fw-bold"
                     [formField]="eventForm.event.eventDate"
                     >
              <app-error-validation [fieldState]="eventForm.event.eventDate()" />
            </div>
            <div class="col-6 mb-3">
              <label class="form-label">Laiks *</label>
              <input type="time" class="form-control bg-secondary bg-opacity-50 fw-bold"
                     [formField]="eventForm.event.eventTime"
                     >
                    
              <app-error-validation [fieldState]="eventForm.event.eventTime()" />
            </div>
          </div>

          <!-- VIETA -->
          <div class="mb-3">
            <label class="form-label">Vieta *</label>
            <input type="text" class="form-control bg-secondary bg-opacity-50 fw-bold"
                   [formField]="eventForm.event.location"
                   placeholder="Rīga, Latvija">
            <app-error-validation [fieldState]="eventForm.event.location()" />
          </div>

          <!-- DALĪBNIEKI -->
          <div class="mb-3">
            <label class="form-label">Maks. dalībnieku skaits *</label>
            <input type="number" class="form-control bg-secondary bg-opacity-50 fw-bold"
                   [formField]="eventForm.event.maxParticipants"
                   placeholder="1">
            <app-error-validation [fieldState]="eventForm.event.maxParticipants()" />
          </div>

          <button class="btn btn-success w-100" (click)="onSubmit()">Izveidot pasākumu</button>
        </div>
      </div>
    </div>
  </div>
</div>
