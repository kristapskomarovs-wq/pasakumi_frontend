<app-navbar />

<div class="container py-4">
  <h2 class="mb-4">Mani pasākumi</h2>

  @for (reg of myRegistrations(); track reg.id) {
    <div class="card mb-3 shadow-sm">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h5>{{ reg.event.title }}</h5>
          <p class="mb-1">📅 {{ reg.event.eventDate }} ⏰ {{ reg.event.eventTime }}</p>
          <p class="mb-0 text-muted">📍 {{ reg.event.location }}</p>
          <small class="text-muted">Pieteicies: {{ reg.registeredAt | date:'medium' }}</small>
        </div>
        <button class="btn btn-outline-danger" (click)="onLeave(reg.event.id)">
          Atcelt dalību
        </button>
      </div>
    </div>
  } @empty {
    <div class="alert alert-info">Tu neesi pieteicies nevienam pasākumam.</div>
  }
</div>
