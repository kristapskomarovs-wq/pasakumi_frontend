<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">🎉 Pasākumu Platforma</h4>
        </div>
        <div class="card-body">

          @if (errorMessage()) {
            <div class="alert alert-danger">{{ errorMessage() }}</div>
          }

          <!-- EMAIL -->
          <div class="mb-3">
            <label class="form-label">E-pasts</label>
            <input type="email" class="form-control"
                   [formField]="loginForm.user.email"
                   (input)="onEmailInput($any($event.target).value)"
                   (keyup.enter)="onCheckEmail()">
            <app-error-validation [fieldState]="loginForm.user.email()" />
          </div>

          <!-- LOGIN -->
          @if (isRegistered() === true) {
            <div class="mb-3">
              <label class="form-label">Parole</label>
              <input type="password" class="form-control"
                     [formField]="loginForm.user.password">
              <app-error-validation [fieldState]="loginForm.user.password()" />
            </div>
            <button class="btn btn-success w-100" (click)="onLogin()">Ielogoties</button>
          }

          <!-- REGISTER -->
          @if (isRegistered() === false) {
            <div class="mb-3">
              <label class="form-label">Parole</label>
              <input type="password" class="form-control"
                     [formField]="loginForm.user.password">
              <app-error-validation [fieldState]="loginForm.user.password()" />
            </div>
            <div class="mb-3">
              <label class="form-label">Apstiprināt paroli</label>
              <input type="password" class="form-control"
                     [formField]="loginForm.user.confirmPassword">
              <app-error-validation [fieldState]="loginForm.user.confirmPassword()" />
            </div>
            <button class="btn btn-success w-100" (click)="onRegister()">Reģistrēties</button>
          }

        </div>
      </div>
    </div>
  </div>
</div>
